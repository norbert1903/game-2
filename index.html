<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LernDuell - Spielerisch Lernen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigationsleiste / Header -->
    <header class="navbar">
        <div class="logo">🦉 LernDuell</div>
        <button id="home-btn" class="btn btn-secondary hidden">Zurück</button>
    </header>

    <main class="container">
        
        <!-- SCREEN 1: Fachauswahl -->
        <section id="subject-screen" class="screen">
            <h1 class="welcome-text">Was möchtest du heute lernen?</h1>
            <p class="subtitle">Wähle ein Fach aus, um dein Abenteuer zu starten!</p>
            
            <div class="card-grid">
                <div class="subject-card card-math" onclick="selectSubject('mathe')">
                    <span class="card-icon">📐</span>
                    <h2>Mathe</h2>
                </div>
                <div class="subject-card card-english" onclick="selectSubject('englisch')">
                    <span class="card-icon">🇬🇧</span>
                    <h2>Englisch</h2>
                </div>
                <div class="subject-card card-history" onclick="selectSubject('geschichte')">
                    <span class="card-icon">⏳</span>
                    <h2>Geschichte</h2>
                </div>
            </div>
        </section>

        <!-- SCREEN 2: Themenauswahl -->
        <section id="topic-screen" class="screen hidden">
            <h1 id="subject-title" class="welcome-text">Mathe</h1>
            <p class="subtitle">Wähle eine Lektion:</p>
            <div id="topic-list" class="topic-grid">
                <!-- Wird dynamisch per JS befüllt -->
            </div>
        </section>

        <!-- SCREEN 3: Quiz-Interface -->
        <section id="quiz-screen" class="screen hidden">
            <!-- Progress Bar -->
            <div class="progress-container">
                <button id="quit-btn" class="close-btn">✕</button>
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>
            </div>

            <div class="quiz-content">
                <h2 id="question-text" class="question-text">Frage wird geladen...</h2>
                <div id="options-container" class="options-container">
                    <!-- Antwort-Buttons werden hier generiert -->
                </div>
            </div>

            <!-- Unteres Feedback-Panel (wie bei Duolingo!) -->
            <div id="feedback-bar" class="feedback-bar hidden">
                <div class="feedback-content">
                    <div id="feedback-message">
                        <span class="feedback-icon" id="feedback-icon">✓</span>
                        <div class="feedback-text">
                            <h3 id="feedback-title">Super gemacht!</h3>
                            <p id="feedback-subtext"></p>
                        </div>
                    </div>
                    <button id="next-btn" class="btn btn-primary" onclick="nextQuestion()">WEITER</button>
                </div>
            </div>
        </section>

        <!-- SCREEN 4: Ergebnisanzeige -->
        <section id="result-screen" class="screen hidden">
            <div class="result-card">
                <div class="result-celebration">🎉</div>
                <h1 class="welcome-text">Lektion abgeschlossen!</h1>
                <p class="subtitle">Du hast deine tägliche Dosis Wissen erhalten!</p>
                
                <div class="stats-container">
                    <div class="stat-box">
                        <span class="stat-num" id="correct-count">0</span>
                        <span class="stat-label">Richtig</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-num" id="xp-gained">0 XP</span>
                        <span class="stat-label">Punkte</span>
                    </div>
                </div>

                <button class="btn btn-primary btn-full" onclick="resetToHome()">NOCHMAL SPIELEN</button>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
